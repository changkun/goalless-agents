<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Flowfield</title>
<style>
  html,body{margin:0;height:100%;background:#05070d;overflow:hidden;font:12px/1.4 ui-monospace,Menlo,monospace;color:#cfd6e4;}
  canvas{display:block;width:100vw;height:100vh;cursor:crosshair;}
  #hud{position:fixed;top:10px;left:12px;pointer-events:none;opacity:.7;mix-blend-mode:screen;}
  #hud b{color:#9ee;}
  #panel{position:fixed;bottom:12px;left:12px;display:flex;gap:8px;align-items:center;}
  button,select{background:#121827;color:#cfd6e4;border:1px solid #2a3550;padding:5px 9px;border-radius:6px;font:inherit;cursor:pointer;}
  button:hover,select:hover{border-color:#4a6cff;}
  kbd{background:#1a2238;border:1px solid #2a3550;border-radius:3px;padding:1px 5px;color:#9ee;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div><b>flowfield</b> — drag to paint ink into a perlin-noise vector field</div>
  <div>keys: <kbd>space</kbd> pause · <kbd>c</kbd> clear · <kbd>r</kbd> reseed field · <kbd>f</kbd> fade · <kbd>g</kbd> show field</div>
</div>
<div id="panel">
  <select id="palette">
    <option value="aurora">aurora</option>
    <option value="ember">ember</option>
    <option value="lagoon">lagoon</option>
    <option value="mono">mono</option>
  </select>
  <button id="burst">burst ✶</button>
  <button id="reset">reset</button>
</div>
<script>
(() => {
  const cvs = document.getElementById('c');
  const ctx = cvs.getContext('2d', { alpha: false });
  let W, H, DPR = Math.min(window.devicePixelRatio || 1, 2);
  function resize() {
    W = cvs.width  = Math.floor(innerWidth  * DPR);
    H = cvs.height = Math.floor(innerHeight * DPR);
    cvs.style.width  = innerWidth + 'px';
    cvs.style.height = innerHeight + 'px';
    ctx.fillStyle = '#05070d'; ctx.fillRect(0, 0, W, H);
  }
  addEventListener('resize', resize);

  // --- value-noise field (lightweight "perlin-ish") ---
  const GRID = 220; // field resolution
  let field = new Float32Array(GRID * GRID);
  let seed = 1;
  function rand() { seed = (seed * 1664525 + 1013904223) >>> 0; return seed / 4294967296; }
  function smooth(t) { return t * t * (3 - 2 * t); }
  function seedField(octaves = 4) {
    seed = (Math.random() * 1e9) | 0;
    const layers = [];
    for (let o = 0; o < octaves; o++) {
      const size = 4 << o; // 4, 8, 16, 32
      const arr = new Float32Array(size * size);
      for (let i = 0; i < arr.length; i++) arr[i] = rand() * Math.PI * 2;
      layers.push({ size, arr });
    }
    for (let y = 0; y < GRID; y++) {
      for (let x = 0; x < GRID; x++) {
        let v = 0, amp = 1, tot = 0;
        for (const { size, arr } of layers) {
          const fx = x / GRID * size, fy = y / GRID * size;
          const x0 = Math.floor(fx), y0 = Math.floor(fy);
          const sx = smooth(fx - x0), sy = smooth(fy - y0);
          const i00 = (y0 % size) * size + (x0 % size);
          const i10 = (y0 % size) * size + ((x0 + 1) % size);
          const i01 = ((y0 + 1) % size) * size + (x0 % size);
          const i11 = ((y0 + 1) % size) * size + ((x0 + 1) % size);
          const a = arr[i00] * (1 - sx) + arr[i10] * sx;
          const b = arr[i01] * (1 - sx) + arr[i11] * sx;
          v += (a * (1 - sy) + b * sy) * amp;
          tot += amp; amp *= 0.5;
        }
        field[y * GRID + x] = (v / tot) * 1.3;
      }
    }
  }
  function angleAt(px, py) {
    const gx = (px / W) * (GRID - 1);
    const gy = (py / H) * (GRID - 1);
    const x0 = Math.floor(gx), y0 = Math.floor(gy);
    const sx = gx - x0, sy = gy - y0;
    const i = y0 * GRID + x0;
    const a = field[i] * (1 - sx) + field[i + 1] * sx;
    const b = field[i + GRID] * (1 - sx) + field[i + GRID + 1] * sx;
    return a * (1 - sy) + b * sy;
  }

  // --- palettes ---
  const palettes = {
    aurora: t => `hsla(${160 + Math.sin(t) * 80},85%,${55 + Math.sin(t*1.7)*10}%,.7)`,
    ember:  t => `hsla(${15 + Math.sin(t)*25},95%,${50 + Math.sin(t*2)*15}%,.75)`,
    lagoon: t => `hsla(${190 + Math.sin(t)*35},80%,${55 + Math.cos(t*1.3)*10}%,.7)`,
    mono:   t => `hsla(220,10%,${70 + Math.sin(t*2)*20}%,.55)`,
  };
  let paletteKey = 'aurora';

  // --- particles ---
  const particles = [];
  const MAX = 4000;
  function spawn(x, y, n = 1, speed = 1.2) {
    for (let i = 0; i < n && particles.length < MAX; i++) {
      particles.push({
        x: x + (Math.random() - 0.5) * 10 * DPR,
        y: y + (Math.random() - 0.5) * 10 * DPR,
        vx: (Math.random() - 0.5) * speed,
        vy: (Math.random() - 0.5) * speed,
        life: 0, maxLife: 180 + Math.random() * 220,
        hueT: Math.random() * Math.PI * 2,
      });
    }
  }

  // --- input ---
  let drawing = false, lastX = 0, lastY = 0, paused = false, fade = 0.04, showField = false;
  function pos(e) {
    const t = e.touches ? e.touches[0] : e;
    return [t.clientX * DPR, t.clientY * DPR];
  }
  cvs.addEventListener('pointerdown', e => {
    drawing = true; [lastX, lastY] = pos(e);
    spawn(lastX, lastY, 40);
    cvs.setPointerCapture(e.pointerId);
  });
  cvs.addEventListener('pointermove', e => {
    if (!drawing) return;
    const [x, y] = pos(e);
    const d = Math.hypot(x - lastX, y - lastY);
    const steps = Math.min(20, Math.max(1, d / (6 * DPR)));
    for (let i = 0; i < steps; i++) {
      const t = i / steps;
      spawn(lastX + (x - lastX) * t, lastY + (y - lastY) * t, 3);
    }
    lastX = x; lastY = y;
  });
  cvs.addEventListener('pointerup', () => drawing = false);
  cvs.addEventListener('pointercancel', () => drawing = false);

  addEventListener('keydown', e => {
    if (e.key === ' ') { paused = !paused; e.preventDefault(); }
    else if (e.key === 'c') { ctx.fillStyle = '#05070d'; ctx.fillRect(0, 0, W, H); particles.length = 0; }
    else if (e.key === 'r') seedField();
    else if (e.key === 'f') fade = fade > 0.02 ? 0.01 : 0.04;
    else if (e.key === 'g') showField = !showField;
  });

  document.getElementById('palette').addEventListener('change', e => paletteKey = e.target.value);
  document.getElementById('burst').addEventListener('click', () => {
    for (let i = 0; i < 30; i++) {
      const a = (i / 30) * Math.PI * 2;
      spawn(W / 2 + Math.cos(a) * 30, H / 2 + Math.sin(a) * 30, 20, 2);
    }
  });
  document.getElementById('reset').addEventListener('click', () => {
    ctx.fillStyle = '#05070d'; ctx.fillRect(0, 0, W, H);
    particles.length = 0; seedField();
  });

  // --- main loop ---
  function step() {
    if (!paused) {
      ctx.fillStyle = `rgba(5,7,13,${fade})`;
      ctx.fillRect(0, 0, W, H);

      if (showField) {
        ctx.strokeStyle = 'rgba(100,140,220,.12)';
        ctx.lineWidth = 1;
        const S = 40 * DPR;
        ctx.beginPath();
        for (let y = S/2; y < H; y += S) {
          for (let x = S/2; x < W; x += S) {
            const a = angleAt(x, y);
            ctx.moveTo(x, y);
            ctx.lineTo(x + Math.cos(a) * S * 0.4, y + Math.sin(a) * S * 0.4);
          }
        }
        ctx.stroke();
      }

      const pal = palettes[paletteKey];
      ctx.lineWidth = 1.3 * DPR;
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        const a = angleAt(p.x, p.y);
        p.vx += Math.cos(a) * 0.12;
        p.vy += Math.sin(a) * 0.12;
        p.vx *= 0.94; p.vy *= 0.94;
        const nx = p.x + p.vx, ny = p.y + p.vy;
        ctx.strokeStyle = pal(p.hueT + p.life * 0.01);
        ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(nx, ny); ctx.stroke();
        p.x = nx; p.y = ny; p.life++;
        if (p.life > p.maxLife || p.x < -20 || p.y < -20 || p.x > W + 20 || p.y > H + 20) {
          particles[i] = particles[particles.length - 1];
          particles.pop();
        }
      }
    }
    requestAnimationFrame(step);
  }

  resize(); seedField(); step();
  // seed a few so the canvas isn't empty on load
  for (let i = 0; i < 20; i++) spawn(W/2, H/2, 10, 2);
})();
</script>
</body>
</html>
