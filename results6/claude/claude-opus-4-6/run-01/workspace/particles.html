<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Particle Sandbox</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; }
  canvas { display: block; cursor: crosshair; }
  #hud {
    position: fixed; top: 20px; left: 20px; color: #8888aa;
    font-size: 13px; pointer-events: none; line-height: 1.6;
  }
  #controls {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 8px; z-index: 10;
  }
  #controls button {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
    color: #aab; padding: 8px 16px; border-radius: 8px; cursor: pointer;
    font-size: 13px; transition: all 0.2s;
  }
  #controls button:hover { background: rgba(255,255,255,0.12); color: #fff; }
  #controls button.active { background: rgba(100,140,255,0.2); border-color: rgba(100,140,255,0.5); color: #8af; }
</style>
</head>
<body>
<div id="hud"></div>
<div id="controls">
  <button data-mode="spray" class="active">Spray</button>
  <button data-mode="attract">Attract</button>
  <button data-mode="repel">Repel</button>
  <button data-mode="vortex">Vortex</button>
  <button id="clearBtn">Clear</button>
  <button id="gravBtn">Gravity: ON</button>
</div>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const hud = document.getElementById('hud');

let W, H;
function resize() {
  W = canvas.width = innerWidth;
  H = canvas.height = innerHeight;
}
resize();
addEventListener('resize', resize);

const particles = [];
const MAX = 8000;
let mode = 'spray';
let gravity = true;
let mouseDown = false;
let mx = 0, my = 0;

class Particle {
  constructor(x, y, vx, vy, hue) {
    this.x = x;
    this.y = y;
    this.vx = vx;
    this.vy = vy;
    this.hue = hue;
    this.life = 1;
    this.decay = 0.0004 + Math.random() * 0.0008;
    this.radius = 1.5 + Math.random() * 2;
  }
}

function spawn(x, y, count) {
  for (let i = 0; i < count && particles.length < MAX; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 0.5 + Math.random() * 3;
    const hue = (Date.now() * 0.03 + Math.random() * 60) % 360;
    particles.push(new Particle(
      x + (Math.random() - 0.5) * 10,
      y + (Math.random() - 0.5) * 10,
      Math.cos(angle) * speed,
      Math.sin(angle) * speed,
      hue
    ));
  }
}

function applyForce(p, fx, fy) {
  p.vx += fx;
  p.vy += fy;
}

function update() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];

    if (gravity) p.vy += 0.04;

    if (mouseDown && mode !== 'spray') {
      const dx = mx - p.x;
      const dy = my - p.y;
      const dist = Math.sqrt(dx * dx + dy * dy) + 1;
      const force = Math.min(200 / (dist * dist), 0.8);
      const nx = dx / dist;
      const ny = dy / dist;

      if (mode === 'attract') {
        applyForce(p, nx * force * 8, ny * force * 8);
      } else if (mode === 'repel') {
        applyForce(p, -nx * force * 12, -ny * force * 12);
      } else if (mode === 'vortex') {
        applyForce(p, (-ny + nx * 0.3) * force * 10, (nx + ny * 0.3) * force * 10);
      }
    }

    p.vx *= 0.995;
    p.vy *= 0.995;
    p.x += p.vx;
    p.y += p.vy;

    if (p.x < 0) { p.x = 0; p.vx *= -0.6; }
    if (p.x > W) { p.x = W; p.vx *= -0.6; }
    if (p.y < 0) { p.y = 0; p.vy *= -0.6; }
    if (p.y > H) { p.y = H; p.vy *= -0.6; }

    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }

  if (mouseDown && mode === 'spray') {
    spawn(mx, my, 8);
  }
}

function draw() {
  ctx.fillStyle = 'rgba(10, 10, 15, 0.15)';
  ctx.fillRect(0, 0, W, H);

  for (const p of particles) {
    const alpha = p.life * 0.8;
    const speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
    const glow = Math.min(speed * 0.5, 4);

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius + glow, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${p.hue}, 80%, 60%, ${alpha * 0.3})`;
    ctx.fill();

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${p.hue}, 90%, 70%, ${alpha})`;
    ctx.fill();
  }

  hud.textContent = `Particles: ${particles.length} / ${MAX}\nMode: ${mode}\nClick & drag to interact`;
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

canvas.addEventListener('mousedown', e => { mouseDown = true; mx = e.clientX; my = e.clientY; });
canvas.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
canvas.addEventListener('mouseup', () => mouseDown = false);
canvas.addEventListener('mouseleave', () => mouseDown = false);

canvas.addEventListener('touchstart', e => {
  e.preventDefault(); mouseDown = true;
  mx = e.touches[0].clientX; my = e.touches[0].clientY;
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  mx = e.touches[0].clientX; my = e.touches[0].clientY;
}, { passive: false });
canvas.addEventListener('touchend', () => mouseDown = false);

document.querySelectorAll('[data-mode]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelector('[data-mode].active')?.classList.remove('active');
    btn.classList.add('active');
    mode = btn.dataset.mode;
  });
});

document.getElementById('clearBtn').addEventListener('click', () => {
  particles.length = 0;
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, W, H);
});

document.getElementById('gravBtn').addEventListener('click', function() {
  gravity = !gravity;
  this.textContent = `Gravity: ${gravity ? 'ON' : 'OFF'}`;
  this.classList.toggle('active', gravity);
});

// seed some particles
for (let i = 0; i < 200; i++) {
  spawn(W * 0.5 + (Math.random() - 0.5) * 300, H * 0.4 + (Math.random() - 0.5) * 200, 1);
}

loop();
</script>
</body>
</html>
